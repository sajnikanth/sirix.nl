<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="sirix verhuurt garageboxen bij Garage Park Soest. Garage storage box rental in Soest, Netherlands.">
  <title>sirix — Garagebox verhuur</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #ffffff 0%, #e8f4ee 50%, #d4ece0 100%);
      background-attachment: fixed;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero {
      width: 100%;
      height: 220px;
      background-color: #1a2e2a;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: -12px;
      background: url('hero.jpg') center/cover no-repeat;
      filter: blur(6px);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: 0.5px;
    }

    .lang-toggle {
      display: flex;
      gap: 8px;
    }

    .lang-toggle button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 3px;
      color: #555;
    }

    .lang-toggle button.active {
      background: #2d6a4f;
      color: white;
      font-weight: 600;
    }

    main {
      flex: 1;
      max-width: 600px;
      margin: 0 auto;
      padding: 48px 32px;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .intro {
      font-size: 18px;
      color: #333;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .boxes {
      margin-bottom: 40px;
    }

    .boxes h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #2d6a4f;
      margin-bottom: 12px;
    }

    .box-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .box-list li {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      padding: 4px 0;
    }

    .contact {
      font-size: 15px;
      color: #333;
      line-height: 1.6;
    }

    .contact a {
      color: #2d6a4f;
      font-weight: 600;
    }

    .contact a:hover {
      opacity: 0.8;
    }

    footer {
      padding: 16px 32px;
      text-align: center;
      font-size: 12px;
      color: #aaa;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    @media (max-width: 480px) {
      .hero { height: 160px; }
      header { padding: 12px 20px; }
      main { padding: 32px 20px; }
    }
  </style>
</head>
<body>

  <div class="hero"></div>

  <header>
    <h1>sirix</h1>
    <div class="lang-toggle">
      <button id="btn-nl" class="active" aria-pressed="true" onclick="setLang('nl')">NL</button>
      <button id="btn-en" aria-pressed="false" onclick="setLang('en')">EN</button>
    </div>
  </header>

  <main>
    <p class="intro">
      <span class="nl">Wij verhuren garageboxen in Soest.</span>
      <span class="en" hidden>We rent out garage storage boxes in Soest.</span>
    </p>

    <div class="boxes">
      <h2>
        <span class="nl">Beschikbare maten</span>
        <span class="en" hidden>Available sizes</span>
      </h2>
      <ul class="box-list">
        <li>2 × 15 m²</li>
        <li>1 × 21 m²</li>
      </ul>
    </div>

    <div class="contact">
      <span class="nl">Interesse? Neem contact op via <a href="mailto:info@sirix.nl">info@sirix.nl</a></span>
      <span class="en" hidden>Interested? Get in touch at <a href="mailto:info@sirix.nl">info@sirix.nl</a></span>
    </div>
  </main>

  <footer>
    &copy; <span id="year"></span> sirix
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function setLang(lang) {
      document.querySelectorAll('.nl').forEach(el => el.hidden = lang !== 'nl');
      document.querySelectorAll('.en').forEach(el => el.hidden = lang !== 'en');
      document.getElementById('btn-nl').classList.toggle('active', lang === 'nl');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-nl').setAttribute('aria-pressed', lang === 'nl');
      document.getElementById('btn-en').setAttribute('aria-pressed', lang === 'en');
      document.documentElement.lang = lang;
    }
  </script>

</body>
</html>
